name: Fuzz

on:
  push:
    branches: [main]
    paths:
      - "crates/greplm-core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  pull_request:
    paths:
      - "crates/greplm-core/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  # Weekly deeper run to keep finding regressions over time.
  schedule:
    - cron: "0 4 * * 1"

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - proto_request
          - trigram_query
          - structural_compile
          - symbol_extract
          - segment_corrupt
          - resolve_ident
          - search_match
          - meta_decode
          - cache_record
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Smoke-run ${{ matrix.target }}
        working-directory: fuzz
        # 60s per target on push/PR; a longer budget on the weekly schedule.
        #
        # Pin the build to the host (gnu) target. cargo-fuzz defaults `--target`
        # to its own binary's host triple, and taiki-e/install-action ships the
        # musl prebuilt — so without this it builds for x86_64-unknown-linux-musl,
        # whose statically linked libc is incompatible with the sanitizer
        # (rust-fuzz/cargo-fuzz#398).
        run: |
          cargo +nightly fuzz run --target "$(rustc --print host-tuple)" ${{ matrix.target }} -- \
            -max_total_time=${{ github.event_name == 'schedule' && 600 || 60 }} \
            -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
